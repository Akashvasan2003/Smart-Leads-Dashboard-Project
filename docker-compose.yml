version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: smart-leads-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - smart-leads-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-leads-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/smart-leads
      JWT_SECRET: ${JWT_SECRET:-smart_leads_super_secret_jwt_key_2024}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost
    depends_on:
      - mongo
    networks:
      - smart-leads-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-leads-frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - smart-leads-network

volumes:
  mongo_data:

networks:
  smart-leads-network:
    driver: bridge
